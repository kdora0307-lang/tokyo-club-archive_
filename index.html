<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokyo Club Archive</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000000;
  overflow: hidden;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
}

.stage {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.scene {
  position: absolute;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1s ease-in-out;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.scene.active {
  opacity: 1;
  pointer-events: all;
}

.scene img {
  max-width: 95vw;
  max-height: 90vh;
  object-fit: contain;
  display: block;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Envelope closed */
.envelope-closed-scene img {
  max-width: 98vw;
  max-height: 98vh;
}

/* Letter - with hover effect */
.envelope-open-scene img {
  max-width: 98vw;
  max-height: 98vh;
  cursor: pointer;
}

.envelope-open-scene img:hover {
  transform: scale(1.05);
}

/* Folder closed */
.folder-scene img {
  max-width: 98vw;
  max-height: 98vh;
}

/* Opened folder workspace */
.workspace-scene {
  width: 100vw;
  height: 100vh;
  position: relative;
  cursor: default;
}

.folder-background {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  max-width: 96vw;
  max-height: 96vh;
  object-fit: contain;
  z-index: 1;
  pointer-events: none;
}

/* Draggable files - ORIGINAL SIZE */
.draggable-file {
  position: absolute;
  cursor: grab;
  z-index: 10;
  object-fit: contain;
  user-select: none;
  -webkit-user-drag: none;
  opacity: 0;
  touch-action: none;
  --file-rotation: 0deg;
  --file-scale: 1;
  transform: rotate(var(--file-rotation)) scale(var(--file-scale));
  transition:
    left 1.15s cubic-bezier(0.22, 1, 0.36, 1),
    top 1.15s cubic-bezier(0.22, 1, 0.36, 1),
    opacity 0.45s ease,
    transform 0.2s ease,
    filter 0.2s ease;
}

.draggable-file:active {
  cursor: grabbing;
  z-index: 100;
}

.draggable-file:hover {
  --file-scale: 1.03;
}

/* Size constraints per file type (based on scatter-natural sizing) */
#file-folder-pink,
#file-sheet-mitsuki-pink,
#file-sheet-mitsuki,
#file-sheet-www,
#file-sheet-circus {
  max-height: 56vh;
  max-width: 34vw;
  width: auto;
  height: auto;
}

#file-folder-pink,
#file-sheet-mitsuki-pink {
  max-height: 62vh;
  max-width: 38vw;
  width: auto;
  height: auto;
}

#file-map {
  max-height: 40vh;
  max-width: 22vw;
  width: auto;
  height: auto;
}

#file-polaroid,
#file-usb {
  max-height: 26vh;
  max-width: 20vw;
  width: auto;
  height: auto;
}

/* Clickable items - subtle affordance */
.draggable-file.clickable:hover {
  filter: brightness(1.06) drop-shadow(0 4px 10px rgba(0, 0, 0, 0.25));
}

/* Initial positions (all centered, ready to scatter) */
.draggable-file {
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(0deg) scale(0.82);
}

.workspace-scene.is-ready .draggable-file {
  transition:
    left 1.15s cubic-bezier(0.22, 1, 0.36, 1),
    top 1.15s cubic-bezier(0.22, 1, 0.36, 1),
    opacity 0.45s ease,
    transform 0.2s ease,
    filter 0.2s ease;
}

.workspace-scene.is-ready .draggable-file.is-dragging {
  transition: none;
  cursor: grabbing;
}

.click-hint {
  position: absolute;
  bottom: 60px;
  font-size: 12px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.92);
  text-shadow: 0 1px 4px rgba(0, 0, 0, 0.55);
  animation: pulse 2s ease-in-out infinite;
  z-index: 1000;
  font-weight: 500;
}

@keyframes pulse {
  0%, 100% { opacity: 0.65; }
  50% { opacity: 1; }
}

.hover-hint {
  position: absolute;
  bottom: 60px;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.3);
  animation: pulse 2s ease-in-out infinite;
  z-index: 1000;
}

/* ---- Modal overlay ---- */
#modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.88);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
  padding: 4vh 4vw;
}

#modal-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

#modal-body {
  position: relative;
  max-width: 100%;
  max-height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

#modal-close {
  position: fixed;
  top: 20px;
  right: 24px;
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.4);
  color: rgba(255, 255, 255, 0.85);
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 8px 14px;
  cursor: pointer;
  z-index: 10001;
  transition: background 0.15s ease, border-color 0.15s ease;
}

#modal-close:hover {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(255, 255, 255, 0.8);
}

.modal-sheet {
  max-width: 92vw;
  max-height: 92vh;
  object-fit: contain;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
}

.modal-video {
  max-width: 92vw;
  max-height: 92vh;
  background: #000;
  outline: none;
}

.modal-placeholder {
  background: rgba(255, 255, 255, 0.05);
  border: 1px dashed rgba(255, 255, 255, 0.3);
  color: rgba(255, 255, 255, 0.7);
  padding: 60px 80px;
  font-family: 'Newsreader', serif;
  font-size: 18px;
  line-height: 1.7;
  text-align: center;
}

.modal-placeholder code {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.9);
  background: rgba(255, 255, 255, 0.1);
  padding: 2px 6px;
  display: inline-block;
  margin-top: 4px;
}

.video-switcher {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  max-width: 92vw;
  max-height: 92vh;
}

.video-switcher .modal-video,
.video-switcher .modal-placeholder {
  max-height: 78vh;
}

.video-tabs {
  display: flex;
  gap: 8px;
}

.video-tab {
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.35);
  color: rgba(255, 255, 255, 0.75);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 8px 18px;
  cursor: pointer;
  transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
}

.video-tab:hover {
  background: rgba(255, 255, 255, 0.08);
}

.video-tab.active {
  background: rgba(255, 255, 255, 0.95);
  color: #000;
  border-color: rgba(255, 255, 255, 0.95);
}

/* ==== Pink folder / club sheet reveal system ==== */
/* Sheets that haven't emerged yet: invisible + not interactive, tucked at folder position */
.draggable-file.inactive {
  opacity: 0 !important;
  pointer-events: none !important;
  z-index: 8 !important;
}

/* Emerge animation: applied briefly when sheets exit the folder */
.draggable-file.emerging {
  transition:
    left 1.35s cubic-bezier(0.22, 1, 0.36, 1),
    top 1.35s cubic-bezier(0.22, 1, 0.36, 1),
    opacity 0.7s ease 0.15s,
    transform 0.35s ease;
}

/* ==== Camera zoom-in on a document ==== */
/* Dark backdrop that fades in behind the zoomed item */
#zoom-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(6, 6, 10, 0.92);
  z-index: 9998;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

#zoom-backdrop.active {
  opacity: 1;
  pointer-events: auto;
  cursor: zoom-out;
}

/* The clicked item, when zoomed, escapes its normal flow */
.draggable-file.zoomed {
  position: fixed !important;
  z-index: 9999 !important;
  cursor: zoom-out;
  transition: transform 0.75s cubic-bezier(0.22, 1, 0.36, 1),
              filter  0.55s ease;
  filter: drop-shadow(0 24px 60px rgba(0, 0, 0, 0.55));
  pointer-events: auto !important;
}

/* Hint shown while zoomed */
#zoom-hint {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255, 255, 255, 0.85);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  z-index: 10000;
  opacity: 0;
  transition: opacity 0.4s ease 0.3s;
  pointer-events: none;
}

#zoom-hint.active { opacity: 0.75; }

/* ==== Repacking animation ==== */
/* When an item is being packed back into the folder */
.draggable-file.packing {
  transition:
    left 0.6s cubic-bezier(0.55, 0, 0.55, 1),
    top 0.6s cubic-bezier(0.55, 0, 0.55, 1),
    opacity 0.5s ease 0.15s,
    transform 0.55s cubic-bezier(0.55, 0, 0.55, 1);
  pointer-events: none !important;
}

.draggable-file.packed {
  opacity: 0 !important;
  pointer-events: none !important;
}

/* Fold-away glow on the folder when items are near */
.workspace-scene.pack-target-highlight .folder-background {
  filter: brightness(1.12) drop-shadow(0 0 24px rgba(255, 255, 255, 0.35));
  transition: filter 0.25s ease;
}

/* Closing transition: fade out workspace scene */
.workspace-scene.closing { opacity: 0; transition: opacity 0.9s ease; pointer-events: none; }

</style>
</head>
<body>
  <div class="stage">
    <!-- STAGE 1: CLOSED ENVELOPE -->
    <div class="scene envelope-closed-scene active">
      <img src="assets/images/envelope-closed.jpg" alt="Envelope">
      <div class="click-hint">OPEN</div>
    </div>

    <!-- STAGE 2: OPENED ENVELOPE WITH LETTER -->
    <div class="scene envelope-open-scene">
      <img src="assets/images/envelope-open.jpg" alt="Letter">
      <div class="click-hint">CONTINUE</div>
    </div>

    <!-- STAGE 3: ARCHIVE FOLDER CLOSED -->
    <div class="scene folder-scene">
      <img src="assets/images/folder-closed.png" alt="Archive Folder">
      <div class="click-hint">OPEN</div>
    </div>

    <!-- STAGE 4: OPENED EMPTY FOLDER WITH SCATTERED FILES -->
    <div class="scene workspace-scene">
      <!-- Empty opened folder background -->
      <img class="folder-background" src="assets/images/folder-open.jpg" alt="Opened Folder">
      
      <!-- Files (scatter on open; each has a data-action for click behavior).
           file-folder-pink is the pink folder — initially uses 8.png (with sheet visible).
           On click, its src swaps to 12.png (empty folder) and the 3 club sheets emerge. -->
      <img id="file-folder-pink" class="draggable-file clickable" src="assets/images/file-sheet-mitsuki-pink.png" alt="Pink Folder — Mitsuki Sheet" data-action="open-pink-folder" data-stage="closed">
      <img id="file-sheet-mitsuki" class="draggable-file clickable inactive" src="assets/images/file-sheet-mitsuki.png" alt="Mitsuki Sheet" data-action="zoom">
      <img id="file-sheet-www" class="draggable-file clickable inactive" src="assets/images/file-sheet-www.png" alt="WWW Sheet" data-action="zoom">
      <img id="file-sheet-circus" class="draggable-file clickable inactive" src="assets/images/file-sheet-circus.png" alt="Circus Tokyo Sheet" data-action="zoom">
      <img id="file-polaroid" class="draggable-file clickable" src="assets/images/file-polaroid.png" alt="Polaroid" data-action="polaroid-videos">
      <img id="file-usb" class="draggable-file clickable" src="assets/images/file-usb.png" alt="USB" data-action="usb-video">
      <img id="file-map" class="draggable-file clickable" src="assets/images/file-map.png" alt="Interactive Map" data-action="map">
      
      <div class="hover-hint">Drag to explore · Click items to open · Drop back into folder to pack away</div>
    </div>
  </div>

  <!-- Camera-zoom backdrop (fades in when zooming into a document) -->
  <div id="zoom-backdrop"></div>
  <div id="zoom-hint">Click anywhere to close</div>

  <!-- Modal overlay for video playback (USB & polaroid) -->
  <div id="modal-overlay">
    <button id="modal-close" aria-label="Close">Close &times;</button>
    <div id="modal-body"></div>
  </div>

  <script>
    let currentStage = 0;
    const stages = ['envelope-closed-scene', 'envelope-open-scene', 'folder-scene', 'workspace-scene'];
    
    const workspaceScene = document.querySelector('.workspace-scene');
    const draggableFiles = Array.from(document.querySelectorAll('.draggable-file'));
    // Scatter positions: x, y are fractions of the workspace (0-1).
    // Pink folder starts at a stack position; the three club sheets have hidden
    // "resting" positions that match where they'll emerge from the pink folder.
    const scatterLayout = {
      'file-folder-pink':  { x: 0.28, y: 0.55, rotate: -3, z: 10 },
      'file-sheet-mitsuki':{ x: 0.44, y: 0.60, rotate: -3, z: 13 },
      'file-sheet-www':    { x: 0.60, y: 0.58, rotate:  4, z: 14 },
      'file-sheet-circus': { x: 0.76, y: 0.55, rotate: -2, z: 15 },
      'file-map':          { x: 0.55, y: 0.25, rotate: -6, z: 17 },
      'file-polaroid':     { x: 0.30, y: 0.24, rotate:-10, z: 18 },
      'file-usb':          { x: 0.80, y: 0.22, rotate: 14, z: 19 }
    };
    // Files that are hidden until the pink folder is opened.
    const HIDDEN_UNTIL_UNLOCK = ['file-sheet-mitsuki', 'file-sheet-www', 'file-sheet-circus'];

    const fileState = new Map();
    const hitTestCache = new WeakMap();
    let scatterInitialized = false;

    function setFilePosition(file, left, top, rotation, zIndex) {
      const state = fileState.get(file) || {};
      state.left = left;
      state.top = top;
      state.rotation = rotation;
      state.zIndex = zIndex ?? state.zIndex ?? 10;
      fileState.set(file, state);

      file.style.left = `${left}px`;
      file.style.top = `${top}px`;
      file.style.opacity = '1';
      file.style.zIndex = state.zIndex;
      file.style.setProperty('--file-rotation', `${rotation}deg`);
      file.style.transform = `rotate(${rotation}deg) scale(var(--file-scale))`;
    }

    function getHitCanvas(file) {
      if (hitTestCache.has(file)) {
        return hitTestCache.get(file);
      }

      const canvas = document.createElement('canvas');
      canvas.width = file.naturalWidth;
      canvas.height = file.naturalHeight;
      const context = canvas.getContext('2d', { willReadFrequently: true });
      context.drawImage(file, 0, 0);

      const cached = { canvas, context };
      hitTestCache.set(file, cached);
      return cached;
    }

    function isOpaqueHit(file, clientX, clientY) {
      const rect = file.getBoundingClientRect();
      if (
        clientX < rect.left ||
        clientX > rect.right ||
        clientY < rect.top ||
        clientY > rect.bottom
      ) {
        return false;
      }

      if (!file.naturalWidth || !file.naturalHeight) {
        return true;
      }

      const state = fileState.get(file);
      const rotation = ((state && state.rotation) || 0) * Math.PI / 180;
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const deltaX = clientX - centerX;
      const deltaY = clientY - centerY;
      const localX = deltaX * Math.cos(rotation) + deltaY * Math.sin(rotation) + file.offsetWidth / 2;
      const localY = -deltaX * Math.sin(rotation) + deltaY * Math.cos(rotation) + file.offsetHeight / 2;

      if (
        localX < 0 ||
        localX > file.offsetWidth ||
        localY < 0 ||
        localY > file.offsetHeight
      ) {
        return false;
      }

      const relativeX = localX / file.offsetWidth;
      const relativeY = localY / file.offsetHeight;
      const pixelX = Math.max(0, Math.min(file.naturalWidth - 1, Math.floor(relativeX * file.naturalWidth)));
      const pixelY = Math.max(0, Math.min(file.naturalHeight - 1, Math.floor(relativeY * file.naturalHeight)));

      try {
        const { context } = getHitCanvas(file);
        const alpha = context.getImageData(pixelX, pixelY, 1, 1).data[3];
        return alpha > 24;
      } catch (error) {
        return true;
      }
    }

    function initializeScatteredFiles() {
      if (scatterInitialized) return;
      scatterInitialized = true;
      const workspaceRect = workspaceScene.getBoundingClientRect();

      draggableFiles.forEach((file) => {
        const layout = scatterLayout[file.id];
        if (!layout) return;

        const width = file.offsetWidth;
        const height = file.offsetHeight;
        const targetLeft = workspaceRect.width * layout.x - width / 2;
        const targetTop = workspaceRect.height * layout.y - height / 2;

        fileState.set(file, {
          left: targetLeft,
          top: targetTop,
          rotation: layout.rotate,
          zIndex: layout.z
        });
      });

      requestAnimationFrame(() => {
        // Position the pink folder first — hidden sheets will start there.
        const folderEl = document.getElementById('file-folder-pink');
        const folderState = fileState.get(folderEl);

        draggableFiles.forEach((file) => {
          const state = fileState.get(file);
          if (!state) return;

          if (HIDDEN_UNTIL_UNLOCK.includes(file.id) && folderState) {
            // Park the sheet at the pink folder's position so when it emerges
            // it looks like it comes out of the folder.
            setFilePosition(file, folderState.left, folderState.top, 0, 8);
          } else {
            setFilePosition(file, state.left, state.top, state.rotation, state.zIndex);
          }
        });
        workspaceScene.classList.add('is-ready');
      });
    }

    function openMapPage() {
      window.location.href = 'map.html';
    }

    // ---- Click routing for clickable files ----
    function handleFileClick(file) {
      const action = file.dataset.action;
      if (!action) return;
      switch (action) {
        case 'map':              openMapPage(); break;
        case 'usb-video':        openUsbVideo(); break;
        case 'polaroid-videos':  openPolaroidVideos(); break;
        case 'zoom':             openSheetZoom(file); break;
        case 'open-pink-folder': openPinkFolder(file); break;
      }
    }

    // ---- Modal system ----
    const modal = document.getElementById('modal-overlay');
    const modalBody = document.getElementById('modal-body');
    const modalClose = document.getElementById('modal-close');

    function openModal(html) {
      modalBody.innerHTML = html;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('active');
      document.body.style.overflow = '';
      // Stop any playing video so audio doesn't linger
      modalBody.querySelectorAll('video').forEach(v => { v.pause(); });
      // Delay clearing HTML until transition finishes
      setTimeout(() => { modalBody.innerHTML = ''; }, 300);
    }

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
    });

    // ---- USB: single video ----
    function openUsbVideo() {
      openModal(`
        <video class="modal-video" controls autoplay playsinline
               src="assets/videos/usb.mp4"
               onerror="this.outerHTML='<div class=\\'modal-placeholder\\'>Add your video at<br><code>assets/videos/usb.mp4</code></div>';">
        </video>
      `);
    }

    // ---- Polaroid: three videos with tab switcher ----
    function openPolaroidVideos() {
      openModal(`
        <div class="video-switcher">
          <video class="modal-video" controls autoplay playsinline
                 src="assets/videos/polaroid-1.mp4"
                 onerror="this.outerHTML='<div class=\\'modal-placeholder\\'>Add your video at<br><code>assets/videos/polaroid-1.mp4</code></div>';">
          </video>
          <div class="video-tabs">
            <button class="video-tab active" data-video="1">Video 1</button>
            <button class="video-tab" data-video="2">Video 2</button>
            <button class="video-tab" data-video="3">Video 3</button>
          </div>
        </div>
      `);
      const tabs = modalBody.querySelectorAll('.video-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          const n = tab.dataset.video;
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const container = modalBody.querySelector('.video-switcher');
          const oldMedia = container.querySelector('.modal-video, .modal-placeholder');
          const newVideo = document.createElement('video');
          newVideo.className = 'modal-video';
          newVideo.controls = true;
          newVideo.autoplay = true;
          newVideo.playsInline = true;
          newVideo.src = `assets/videos/polaroid-${n}.mp4`;
          newVideo.onerror = function() {
            this.outerHTML = `<div class="modal-placeholder">Add your video at<br><code>assets/videos/polaroid-${n}.mp4</code></div>`;
          };
          container.replaceChild(newVideo, oldMedia);
        });
      });
    }

    // ---- Pink folder: two-stage open ----
    function openPinkFolder(file) {
      if (file.dataset.stage !== 'closed') return;
      file.dataset.stage = 'open';
      // Swap image: pink sheet-in-folder -> empty pink folder
      file.src = 'assets/images/file-folder-pink.png';
      file.alt = 'Pink Folder (empty)';
      // After opening, the empty folder becomes zoomable
      file.dataset.action = 'zoom';

      // Recompute target positions from scatterLayout — fileState currently holds
      // the "parked at folder" position, so we can't read the target from there.
      const workspaceRect = workspaceScene.getBoundingClientRect();

      HIDDEN_UNTIL_UNLOCK.forEach((id, idx) => {
        const sheet = document.getElementById(id);
        const layout = scatterLayout[id];
        if (!sheet || !layout) return;
        const w = sheet.offsetWidth;
        const h = sheet.offsetHeight;
        const targetLeft = workspaceRect.width * layout.x - w / 2;
        const targetTop = workspaceRect.height * layout.y - h / 2;

        sheet.classList.add('emerging');
        sheet.classList.remove('inactive');
        setTimeout(() => {
          setFilePosition(sheet, targetLeft, targetTop, layout.rotate, layout.z);
        }, idx * 110);
        setTimeout(() => sheet.classList.remove('emerging'), 1800 + idx * 110);
      });
    }

    // ---- Camera zoom: the actual document floats up to fill the viewport ----
    const zoomBackdrop = document.getElementById('zoom-backdrop');
    const zoomHint = document.getElementById('zoom-hint');
    let zoomedFile = null;
    let zoomJustOpened = false;

    function openSheetZoom(file) {
      if (zoomedFile || file.classList.contains('packing') || file.classList.contains('packed')) return;
      zoomedFile = file;
      zoomJustOpened = true;
      setTimeout(() => { zoomJustOpened = false; }, 260);

      const rect = file.getBoundingClientRect();
      const state = fileState.get(file);
      const rotation = state ? state.rotation : 0;

      // Stash originals so we can restore
      file.dataset._origLeft = file.style.left;
      file.dataset._origTop = file.style.top;
      file.dataset._origTransform = file.style.transform;
      file.dataset._origZ = file.style.zIndex;

      // Promote to fixed positioning at current viewport bbox
      file.classList.add('zoomed');
      file.style.left = rect.left + 'px';
      file.style.top = rect.top + 'px';
      file.style.transform = `rotate(${rotation}deg) scale(1)`;
      file.offsetHeight; // force reflow

      // Compute target: center + scale so height fills ~86vh (respecting aspect)
      const targetH = window.innerHeight * 0.86;
      const scale = Math.min(targetH / rect.height, (window.innerWidth * 0.92) / rect.width);
      const currentCX = rect.left + rect.width / 2;
      const currentCY = rect.top + rect.height / 2;
      const dx = (window.innerWidth / 2) - currentCX;
      const dy = (window.innerHeight / 2) - currentCY;

      requestAnimationFrame(() => {
        file.style.transform = `translate(${dx}px, ${dy}px) rotate(0deg) scale(${scale})`;
        zoomBackdrop.classList.add('active');
        zoomHint.classList.add('active');
      });
    }

    function closeSheetZoom() {
      if (!zoomedFile) return;
      const file = zoomedFile;
      const state = fileState.get(file);
      const rotation = state ? state.rotation : 0;
      // Animate back to original rotation & scale (position holds at fixed origin)
      file.style.transform = `rotate(${rotation}deg) scale(1)`;
      zoomBackdrop.classList.remove('active');
      zoomHint.classList.remove('active');
      setTimeout(() => {
        file.classList.remove('zoomed');
        file.style.left = file.dataset._origLeft || '';
        file.style.top = file.dataset._origTop || '';
        file.style.transform = file.dataset._origTransform || '';
        file.style.zIndex = file.dataset._origZ || '';
        delete file.dataset._origLeft;
        delete file.dataset._origTop;
        delete file.dataset._origTransform;
        delete file.dataset._origZ;
        zoomedFile = null;
      }, 780);
    }

    zoomBackdrop.addEventListener('click', closeSheetZoom);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && zoomedFile) closeSheetZoom();
    });
    // When something is zoomed, clicking anywhere on the page (including on the
    // zoomed document itself) should close it. The zoomJustOpened guard prevents
    // the opening click from immediately re-closing.
    document.addEventListener('click', (e) => {
      if (!zoomedFile || zoomJustOpened) return;
      if (e.target.closest('#modal-overlay')) return;
      closeSheetZoom();
    }, true);

    // ---- Repacking: drop items back on the folder to pack them away ----
    // Returns true if the item's drop-point is close enough to the folder to pack.
    function isNearFolder(clientX, clientY) {
      const bg = document.querySelector('.folder-background');
      if (!bg) return false;
      const r = bg.getBoundingClientRect();
      // The folder image is a photo of an open folder; the "landing zone" for
      // a document is roughly the folder's inner surface — a comfortably-sized
      // region centered inside the image, not the full bbox.
      const inset = Math.min(r.width, r.height) * 0.18;
      return (
        clientX >= r.left + inset &&
        clientX <= r.right - inset &&
        clientY >= r.top + inset &&
        clientY <= r.bottom - inset
      );
    }

    let packedCount = 0;
    let closingInProgress = false;

    function packFile(file) {
      if (file.classList.contains('packing') || file.classList.contains('packed')) return;
      const folderEl = document.getElementById('file-folder-pink');
      const folderState = fileState.get(folderEl) || {};
      const targetLeft = folderState.left || (workspaceScene.clientWidth / 2 - file.offsetWidth / 2);
      const targetTop = folderState.top || (workspaceScene.clientHeight / 2 - file.offsetHeight / 2);

      file.classList.add('packing');
      // Animate: slide to folder + shrink slightly + fade out
      file.style.left = targetLeft + 'px';
      file.style.top = targetTop + 'px';
      file.style.transform = 'rotate(0deg) scale(0.4)';
      file.style.opacity = '0';

      setTimeout(() => {
        file.classList.remove('packing');
        file.classList.add('packed');
        packedCount++;
        checkAllPacked();
      }, 620);
    }

    function packableFiles() {
      // Exclude: pink folder itself, hidden/inactive sheets, already-packed items
      return draggableFiles.filter(f =>
        f.id !== 'file-folder-pink' &&
        !f.classList.contains('inactive') &&
        !f.classList.contains('packed')
      );
    }

    function totalPackable() {
      // Everything except the pink folder + currently-inactive sheets counts.
      return draggableFiles.filter(f =>
        f.id !== 'file-folder-pink' &&
        !f.classList.contains('inactive')
      ).length;
    }

    function checkAllPacked() {
      if (closingInProgress) return;
      if (packedCount >= totalPackable() && totalPackable() > 0) {
        closeFolderScene();
      }
    }

    function closeFolderScene() {
      closingInProgress = true;
      // Also pack the pink folder itself with a little flourish
      const folder = document.getElementById('file-folder-pink');
      if (folder) {
        folder.classList.add('packing');
        folder.style.transform = 'rotate(0deg) scale(0.6)';
        folder.style.opacity = '0';
      }
      // Fade out workspace, then swap back to the closed folder scene
      setTimeout(() => {
        workspaceScene.classList.add('closing');
        setTimeout(() => resetToClosedFolder(), 900);
      }, 500);
    }

    function resetToClosedFolder() {
      // Reset every draggable back to its base "inactive" state so re-opening works.
      workspaceScene.classList.remove('closing', 'is-ready', 'active', 'pack-target-highlight');
      workspaceScene.style.opacity = '';
      draggableFiles.forEach(f => {
        f.classList.remove('packing', 'packed', 'emerging', 'zoomed');
        f.style.left = ''; f.style.top = ''; f.style.transform = '';
        f.style.opacity = ''; f.style.zIndex = '';
      });
      // Restore hidden state on the 3 club sheets
      HIDDEN_UNTIL_UNLOCK.forEach(id => {
        const s = document.getElementById(id);
        if (s) s.classList.add('inactive');
      });
      // Restore pink folder to its "closed" (with pink sheet visible) state
      const folder = document.getElementById('file-folder-pink');
      if (folder) {
        folder.dataset.stage = 'closed';
        folder.dataset.action = 'open-pink-folder';
        folder.src = 'assets/images/file-sheet-mitsuki-pink.png';
        folder.alt = 'Pink Folder — Mitsuki Sheet';
      }
      packedCount = 0;
      scatterInitialized = false;
      closingInProgress = false;
      // Go back to stage 3 (the closed folder view). User can click again to re-open.
      document.querySelector(`.${stages[currentStage]}`).classList.remove('active');
      currentStage = 2;
      document.querySelector(`.${stages[currentStage]}`).classList.add('active');
      document.body.style.cursor = 'pointer';
    }

    // Click handler for first 3 stages
    document.body.addEventListener('click', (e) => {
      // Only advance stages if we're not in workspace and didn't click on a draggable file
      if (currentStage < stages.length - 1 && !e.target.classList.contains('draggable-file')) {
        // Hide current stage
        document.querySelector(`.${stages[currentStage]}`).classList.remove('active');
        
        // Show next stage
        currentStage++;
        document.querySelector(`.${stages[currentStage]}`).classList.add('active');
        
        // Remove cursor pointer when we reach workspace
        if (currentStage === stages.length - 1) {
          document.body.style.cursor = 'default';
          initializeScatteredFiles();
        }
      }
    });

    let pointerState = null;
    let highestZIndex = 20;

    draggableFiles.forEach((file) => {
      file.addEventListener('pointerdown', (e) => {
        if (currentStage !== stages.length - 1) return;
        const state = fileState.get(file);
        if (!state) return;
        if (!isOpaqueHit(file, e.clientX, e.clientY)) return;

        pointerState = {
          file,
          pointerId: e.pointerId,
          startX: e.clientX,
          startY: e.clientY,
          originLeft: state.left,
          originTop: state.top,
          dragStarted: false
        };

        file.setPointerCapture(e.pointerId);
        e.preventDefault();
        e.stopPropagation();
      });

      file.addEventListener('pointermove', (e) => {
        if (!pointerState || pointerState.file !== file || pointerState.pointerId !== e.pointerId) return;

        const deltaX = e.clientX - pointerState.startX;
        const deltaY = e.clientY - pointerState.startY;
        const movedEnough = Math.hypot(deltaX, deltaY) > 6;

        if (!pointerState.dragStarted && movedEnough) {
          pointerState.dragStarted = true;
          file.classList.add('is-dragging');
          highestZIndex += 1;
          const state = fileState.get(file);
          state.zIndex = highestZIndex;
          file.style.zIndex = highestZIndex;
        }

        if (!pointerState.dragStarted) return;

        const nextLeft = pointerState.originLeft + deltaX;
        const nextTop = pointerState.originTop + deltaY;
        const state = fileState.get(file);
        setFilePosition(file, nextLeft, nextTop, state.rotation, state.zIndex);

        // Highlight the folder when this file (if packable) is dragged over it
        if (file.id !== 'file-folder-pink' && isNearFolder(e.clientX, e.clientY)) {
          workspaceScene.classList.add('pack-target-highlight');
        } else {
          workspaceScene.classList.remove('pack-target-highlight');
        }
      });

      file.addEventListener('pointerup', (e) => {
        if (!pointerState || pointerState.file !== file || pointerState.pointerId !== e.pointerId) return;

        const wasDrag = pointerState.dragStarted;
        const upX = e.clientX, upY = e.clientY;
        file.classList.remove('is-dragging');
        file.releasePointerCapture(e.pointerId);
        pointerState = null;
        workspaceScene.classList.remove('pack-target-highlight');

        if (!wasDrag) {
          handleFileClick(file);
          return;
        }
        // If it was a drag and dropped over the folder, pack it away (except the folder itself)
        if (file.id !== 'file-folder-pink' && isNearFolder(upX, upY)) {
          packFile(file);
        }
      });

      file.addEventListener('pointercancel', () => {
        if (!pointerState || pointerState.file !== file) return;
        file.classList.remove('is-dragging');
        try {
          file.releasePointerCapture(pointerState.pointerId);
        } catch (error) {}
        pointerState = null;
      });
    });

    document.addEventListener('pointerup', () => {
      if (!pointerState) return;
      pointerState.file.classList.remove('is-dragging');
      pointerState = null;
    });

    window.addEventListener('resize', () => {
      if (!scatterInitialized) return;
      scatterInitialized = false;
      initializeScatteredFiles();
    });
  </script>
</body>
</html>
